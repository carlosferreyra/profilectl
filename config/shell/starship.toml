# Starship Prompt Configuration
# https://starship.rs

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$cmd_duration\
$line_break\
$character"""

add_newline = true

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"

[username]
show_always = false
format = "[$user]($style) "
style_user = "bold white"

[hostname]
ssh_only = true
format = "[$hostname]($style) "
style = "bold blue"

[directory]
truncation_length = 3
truncate_to_repo = true
format = "[$path]($style) "
style = "bold cyan"

[directory.substitutions]
"Documents" = "󰈙 "
"Downloads" = " "
"Music" = " "
"Pictures" = " "

[git_branch]
symbol = " "
format = "[on]($style) [$symbol$branch]($style) "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold red"
conflicted = "🏳 "
up_to_date = "✓"
behind = "⇣${count}"
diverged = "⇕⇣${ahead_count}⇡${behind_count}"
untracked = "?${count}"
stashed = "$${count}"
modified = "!${count}"
staged = "+${count}"
renamed = "»${count}"
deleted = "✘${count}"

[cmd_duration]
min_time = 500
format = "took [$duration]($style) "
style = "bold yellow"

[python]
symbol = " "
format = "[${symbol}${pyenv_prefix}(${version} )]($style)"
style = "yellow bold"

[rust]
symbol = " "
format = "[${symbol}(${version} )]($style)"
style = "red bold"

[go]
symbol = " "
format = "[${symbol}(${version} )]($style)"
style = "cyan bold"

[nodejs]
symbol = " "
format = "[${symbol}(${version} )]($style)"
style = "green bold"
