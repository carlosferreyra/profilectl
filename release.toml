# cargo-release configuration
# Usage: cargo release patch|minor|major

# Run git-cliff before tagging so CHANGELOG.md is always up to date.
pre-release-hook = ["git-cliff", "--output", "CHANGELOG.md", "--tag", "{{version}}"]

# Commit the generated changelog and version bumps together.
pre-release-commit-message = "chore: release v{{version}}"

# Tag format expected by git-cliff and cargo-dist.
tag-name = "v{{version}}"

# Push the tag so cargo-dist picks it up and triggers release.yml.
push = true

# Publish all workspace crates to crates.io.
# --no-verify mirrors the uv project: verification is done in CI dry-run,
# not at publish time.
publish = true
publish-args = ["--no-verify", "--workspace"]

# All crates share the same version (bumped together).
shared-version = true
