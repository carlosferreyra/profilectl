name: Check release

on:
  pull_request:
    paths:
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'crates/*/Cargo.toml'
      - 'dist-workspace.toml'
      - 'release.toml'

jobs:
  dist-plan:
    name: cargo dist plan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-dist
        run: cargo install cargo-dist --locked
      - name: Dry-run dist plan
        run: dist plan
