name: Publish crates

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write # needed by cargo-dist to create GitHub releases

jobs:
  release:
    name: cargo-dist release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # git-cliff needs full history

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-dist
        run: cargo install cargo-dist --locked

      - name: Build and publish release artifacts
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dist build --release --output-format=json | dist upload

      - name: Publish to crates.io
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cargo publish -p profilectl-types
          cargo publish -p profilectl-config
          cargo publish -p profilectl-cli
          cargo publish -p profilectl-interactive
          cargo publish -p dfiles
